spring.application.name=progetto-giorno-12
spring.datasource.url = jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.datasource.username=sa
spring.datasource.password=


# Questa proprietà serve per gestire automaticamente lo schema del database.
# All'avvio dell'applicazione Hibernate crea automaticamente lo schema del database (tabelle)
# e lo elimini alla chiusura
spring.jpa.hibernate.ddl-auto=create-drop


# Questa proprietà configura il livello minimo di logging per ignorare messagi meno gravi nella console
logging.level.root = warn
# Questa proprietà disabilita la visualizzazione del banner nella console
spring.main.banner-mode = off

# Mostra SQL
spring.jpa.show-sql=true

# Formatta SQL per leggibilità
spring.jpa.properties.hibernate.format_sql=true

# Opzionale: mostra i valori dei parametri (invece di ?)
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Configura la registrazione su file (file specifico)
logging.file.name=hibernate-queries.txt
logging.level.org.hibernate.SQL=DEBUG




